<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>automateable | Automation Consulting, AI Agents & Custom Workflow Systems</title>
    <meta name="description" content="We turn messy manual workflows into automated systems. Automation consulting, AI agents, and custom tools for founders, creators, operators, and small businesses. Fixed-scope audits from $497." />

    <!-- Open Graph -->

    <meta property="og:url" content="https://automateable.com/" />
    <meta property="og:title" content="automateable | Turn Messy Workflows Into Automated Systems" />
    <meta property="og:description" content="Automation consulting, AI agents, and custom tools. We map your workflow, find what to automate, and build systems that run without you. Fixed-scope audits from $497." />
    <meta property="og:image" content="https://automateable.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="automateable - Automation consulting and AI agents" />
    <meta property="og:site_name" content="automateable" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@automateable" />
    <meta name="twitter:title" content="automateable | Turn Messy Workflows Into Automated Systems" />
    <meta name="twitter:description" content="Automation consulting, AI agents, and custom tools for founders, creators, and small businesses. Fixed-scope audits from $497." />
    <meta name="twitter:image" content="https://automateable.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#faf8f5" />
    <meta name="msapplication-TileColor" content="#faf8f5" />

    <!-- Performance: font preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" />

      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    </noscript>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "automateable",
      "url": "https://automateable.com",
      "logo": "https://automateable.com/favicon.svg",
      "description": "Automation consulting, AI agents, and custom workflow tools for founders, creators, operators, and small businesses.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "url": "https://automateable.com/contact"
      },
      "offers": {
        "@type": "AggregateOffer",
        "description": "Automation audit, build sprint, and retainer services",
        "lowPrice": "497",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- JSON-LD: WebSite (enables sitelinks searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "automateable",
      "url": "https://automateable.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://automateable.com/automation-resources?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
